# media-mcp — service conteneurisé (isolation deps/malware vs hôte ; parité publer/discord-mcp).
# ⚠️ network_mode host : le bridge Docker par défaut de CE VPS n'a PAS d'egress (mesuré sur publer-mcp :
#    fetch échoue sur bridge, 200 en --network host). Le runtime DOIT joindre api.x.ai → réseau hôte.
#    Isolation FS/deps/process PRÉSERVÉE (une dép compromise reste dans le conteneur) ; seul le net est partagé.
# ⚠️ Avec network_mode host : pas de mapping `ports`, l'app bind directement MEDIA_MCP_HTTP_HOST:PORT
#    sur l'hôte = 100.64.0.1:8791 (IP Tailscale, tailnet only — JAMAIS 0.0.0.0). serve :8452 pointe dessus.
# ⚠️ build.network host : npm ci a besoin du réseau (même raison que le runtime).
# ⚠️ Secrets montés read-only, JAMAIS dans l'image. service.env (chmod 600) = token/port/allowed-hosts.
services:
  media-mcp:
    build:
      context: .
      network: host
    image: media-mcp:latest
    container_name: media-mcp
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./service.env
    environment:
      MEDIA_MCP_HTTP_HOST: "100.64.0.1"
    volumes:
      - ./.secrets.json:/app/.secrets.json:ro
